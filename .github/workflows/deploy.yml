name: Deploy dashboard to GitHub Pages

# Builds the .env file from repository secrets at deploy time, then publishes
# the static site to GitHub Pages. Set repo Settings > Pages > Source to
# "GitHub Actions" for this to take effect.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate .env from secrets
        run: |
          {
            echo "SHAREPOINT_URL=${{ secrets.SHAREPOINT_URL }}"
            echo "SHEET_NAME=${{ secrets.SHEET_NAME }}"
            echo "AAD_CLIENT_ID=${{ secrets.AAD_CLIENT_ID }}"
            echo "AAD_TENANT_ID=${{ secrets.AAD_TENANT_ID }}"
          } > .env

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
